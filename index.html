<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submerged Archive</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: serif; }
        
        /* The Canvas for your 3D World */
        #canvas3d { width: 100vw; height: 100vh; display: block; }

        /* Cinematic Navigation Arrows */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.2); /* Faded until hovered */
            font-size: 100px;
            font-weight: 100;
            cursor: pointer;
            z-index: 10;
            transition: 0.4s;
            padding: 0 40px;
            user-select: none;
        }
        .arrow:hover { color: #fff; transform: translateY(-50%) scale(1.1); }
        #prev { left: 5%; }
        #next { right: 5%; }

        /* Lightbox for Expansion */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #lightbox img { max-width: 85%; max-height: 85%; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 50px rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <button id="prev" class="arrow">‹</button>
    <button id="next" class="arrow">›</button>

    <div id="lightbox"><img id="view" src=""></div>

    <canvas id="canvas3d"></canvas>

    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime';

        const canvas = document.getElementById('canvas3d');
        const app = new Application(canvas);

        // Your 12 images must be in a folder named 'images' on GitHub
        const photoLinks = [
            './images/1.jpg', './images/2.jpg', './images/3.jpg', './images/4.jpg',
            './images/5.jpg', './images/6.jpg', './images/7.jpg', './images/8.jpg',
            './images/9.jpg', './images/10.jpg', './images/11.jpg', './images/12.jpg'
        ];
        let current = 0;

        app.load('./scene.splinecode').then(() => {
            // Finding the rectangle by the name you set in the sidebar
            const rect = app.findObjectByName('Falsecolor Rectangle');

            const loadPhoto = (i) => {
                if (!rect) {
                    console.error("The name 'Falsecolor Rectangle' was not found in the 3D scene.");
                    return;
                }
                
                const loader = new THREE.TextureLoader();
                loader.load(photoLinks[i], (texture) => {
                    // This forces the image to stay inside the bounds of your rectangle
                    rect.material.map = texture;
                    rect.material.needsUpdate = true;
                }, undefined, (err) => {
                    console.error("Failed to load image: " + photoLinks[i] + ". Check your 'images' folder on GitHub.");
                });
            };

            // Initial display
            loadPhoto(current);

            document.getElementById('next').onclick = () => {
                current = (current + 1) % photoLinks.length;
                loadPhoto(current);
            };

            document.getElementById('prev').onclick = () => {
                current = (current - 1 + photoLinks.length) % photoLinks.length;
                loadPhoto(current);
            };

            // Detect click on the 3D rectangle to expand
            app.on('mouseDown', (e) => {
                if (e.target.name === 'Falsecolor Rectangle') {
                    document.getElementById('view').src = photoLinks[current];
                    document.getElementById('lightbox').style.display = 'flex';
                }
            });
        });

        document.getElementById('lightbox').onclick = () => {
            document.getElementById('lightbox').style.display = 'none';
        };
    </script>
</body>
</html>
