<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Image Gallery</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100vh; }

        /* Navigation UI */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 10;
        }
        button {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid white;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        button:hover { background: rgba(255, 255, 255, 0.3); }

        /* Lightbox Overlay */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #lightbox img { max-width: 90%; max-height: 90%; border: 2px solid white; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="prev">Previous</button>
        <button id="next">Next</button>
    </div>

    <div id="lightbox">
        <img id="expanded-img" src="" alt="Expanded View">
    </div>

    <canvas id="canvas3d"></canvas>

    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime';

        const canvas = document.getElementById('canvas3d');
        const app = new Application(canvas);

        // List of your 12 images
        const imageList = [
            './images/1.jpg', './images/2.jpg', './images/3.jpg', './images/4.jpg',
            './images/5.jpg', './images/6.jpg', './images/7.jpg', './images/8.jpg',
            './images/9.jpg', './images/10.jpg', './images/11.jpg', './images/12.jpg'
        ];
        let currentIndex = 0;

        app.load('./scene.splinecode').then(() => {
            const rect = app.findObjectByName('Falsecolor Rectangle');

            // Function to update the 3D rectangle texture
            const updateGallery = (index) => {
                const loader = new THREE.TextureLoader();
                loader.load(imageList[index], (texture) => {
                    rect.material.map = texture;
                    rect.material.needsUpdate = true;
                });
            };

            // Initial load
            updateGallery(currentIndex);

            // Navigation Logic
            document.getElementById('next').onclick = () => {
                currentIndex = (currentIndex + 1) % imageList.length;
                updateGallery(currentIndex);
            };

            document.getElementById('prev').onclick = () => {
                currentIndex = (currentIndex - 1 + imageList.length) % imageList.length;
                updateGallery(currentIndex);
            };

            // Click Rectangle to Expand
            app.on('mouseDown', (e) => {
                if (e.target.name === 'Falsecolor Rectangle') {
                    const lightbox = document.getElementById('lightbox');
                    document.getElementById('expanded-img').src = imageList[currentIndex];
                    lightbox.style.display = 'flex';
                }
            });
        });

        // Close Lightbox
        document.getElementById('lightbox').onclick = function() {
            this.style.display = 'none';
        };
    </script>
</body>
</html>
