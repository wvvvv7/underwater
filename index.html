<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Underwater Dream</title>
  <style>
    body, html { margin: 0; padding: 0; height: 1000vh; background: #000; }
    
    #canvas-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      /* This allows the phone to scroll the page */
      touch-action: pan-y;
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <div id="canvas-wrap">
    <script type="module" src="https://unpkg.com/@splinetool/viewer/build/spline-viewer.js"></script>
    <spline-viewer 
      url="./scene.splinecode" 
      events-target="global">
    </spline-viewer>
  </div>

  <script type="module">
    // This script removes the watermark for a clean, noble look
    const removeLogo = setInterval(() => {
      const viewer = document.querySelector('spline-viewer');
      if (viewer && viewer.shadowRoot) {
        const logo = viewer.shadowRoot.querySelector('#logo');
        if (logo) {
          logo.remove();
          clearInterval(removeLogo);
        }
      }
    }, 100);
  </script>

</body>
</html>
