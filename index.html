<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Underwater & Falsecolor</title>
  <style>
    body, html { margin: 0; padding: 0; background: #000; }

    /* Each section creates the space for the scroll animations */
    .scroll-section {
      position: relative;
      width: 100%;
      height: 500vh; /* Adjust this to change the scroll length */
    }

    /* The viewer stays pinned to the screen during its section */
    spline-viewer {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

  <section class="scroll-section">
    <script type="module" src="https://unpkg.com/@splinetool/viewer/build/spline-viewer.js"></script>
    <spline-viewer url="./scene.splinecode" events-target="global"></spline-viewer>
  </section>

  <section class="scroll-section">
    <spline-viewer 
      url="https://wvvvv7.github.io/falsecolor/scene_falsecolor.splinecode" 
      events-target="global">
    </spline-viewer>
  </section>

  <script type="module">
    // This script removes the marks from all viewers on the page
    const removeLogos = setInterval(() => {
      const viewers = document.querySelectorAll('spline-viewer');
      viewers.forEach(viewer => {
        if (viewer && viewer.shadowRoot) {
          const logo = viewer.shadowRoot.querySelector('#logo');
          if (logo) logo.remove();
        }
      });
    }, 100);
  </script>

</body>
</html>
