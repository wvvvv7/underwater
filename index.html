<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Archive</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: serif; }
        #canvas3d { width: 100vw; height: 100vh; display: block; }

        .nav-arrow {
            position: absolute;
            background: none;
            border: none;
            color: white;
            font-size: 60px;
            font-weight: 100;
            cursor: pointer;
            z-index: 10;
            opacity: 0; /* Hidden by default */
            transition: opacity 0.5s ease, transform 0.3s;
            user-select: none;
            pointer-events: none; /* Cannot click while hidden */
        }
        
        .nav-arrow.visible {
            opacity: 0.4;
            pointer-events: auto;
        }

        .nav-arrow:hover { opacity: 1; transform: scale(1.2); }
    </style>
</head>
<body>

    <button id="prevBtn" class="nav-arrow">‹</button>
    <button id="nextBtn" class="nav-arrow">›</button>

    <canvas id="canvas3d"></canvas>

    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime';

        const canvas = document.getElementById('canvas3d');
        const app = new Application(canvas);

        const images = ['./images/1.jpg', './images/2.jpg', './images/3.jpg', './images/4.jpg', './images/5.jpg', './images/6.jpg', './images/7.jpg', './images/8.jpg', './images/9.jpg', './images/10.jpg', './images/11.jpg', './images/12.jpg'];
        let index = 0;

        app.load('./scene.splinecode').then(() => {
            const rect = app.findObjectByName('Falsecolor Rectangle');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            const updateGallery = (i) => {
                const loader = new THREE.TextureLoader();
                loader.load(images[i], (tex) => {
                    rect.material.map = tex;
                    rect.material.needsUpdate = true;
                });
            };

            updateGallery(index);

            // This loop runs every frame to track the rectangle
            function animate() {
                if (rect) {
                    // 1. Check if the object is visible and has opacity
                    // We use a threshold to decide when to show the arrows
                    const isVisible = rect.visible && rect.opacity > 0.1;

                    if (isVisible) {
                        // 2. Project the 3D position to 2D screen coordinates
                        const screenPos = app.project(rect.position);
                        
                        // 3. Position arrows beside the rectangle
                        // We offset them by about 20% of the screen width
                        const offset = window.innerWidth * 0.15;

                        prevBtn.style.left = `${screenPos.x - offset}px`;
                        prevBtn.style.top = `${screenPos.y}px`;
                        nextBtn.style.left = `${screenPos.x + offset}px`;
                        nextBtn.style.top = `${screenPos.y}px`;

                        prevBtn.classList.add('visible');
                        nextBtn.classList.add('visible');
                    } else {
                        prevBtn.classList.remove('visible');
                        nextBtn.classList.remove('visible');
                    }
                }
                requestAnimationFrame(animate);
            }

            animate();

            nextBtn.onclick = () => { index = (index + 1) % images.length; updateGallery(index); };
            prevBtn.onclick = () => { index = (index - 1 + images.length) % images.length; updateGallery(index); };
        });
    </script>
</body>
</html>
