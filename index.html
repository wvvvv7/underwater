<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Archive</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* A subtle hint for the user */
        #hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-family: serif;
            letter-spacing: 2px;
            font-size: 12px;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="hint">Click the frame to explore</div>
    <canvas id="canvas3d"></canvas>

    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime';

        const canvas = document.getElementById('canvas3d');
        const app = new Application(canvas);

        const images = [
            './images/1.jpg', './images/2.jpg', './images/3.jpg', './images/4.jpg',
            './images/5.jpg', './images/6.jpg', './images/7.jpg', './images/8.jpg',
            './images/9.jpg', './images/10.jpg', './images/11.jpg', './images/12.jpg'
        ];
        let index = 0;

        app.load('./scene.splinecode').then(() => {
            const rect = app.findObjectByName('Falsecolor Rectangle');

            const applyTexture = (i) => {
                if (!rect) return;
                const loader = new THREE.TextureLoader();
                loader.load(images[i], (tex) => {
                    rect.material.map = tex;
                    rect.material.needsUpdate = true;
                });
            };

            // Display the first image immediately
            applyTexture(index);

            // The rectangle now acts as the button
            app.on('mouseDown', (e) => {
                if (e.target.name === 'Falsecolor Rectangle') {
                    // Move to the next image
                    index = (index + 1) % images.length;
                    applyTexture(index);
                }
            });
        });
    </script>
</body>
</html>
