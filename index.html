<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Underwater Archive</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; }
        /* Ensure the canvas fills the screen */
        #canvas3d { width: 100vw; height: 100vh; display: block; }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 60px;
            cursor: pointer;
            z-index: 10;
            padding: 20px;
            transition: color 0.3s;
        }
        .nav-arrow:hover { color: #fff; }
        #prevBtn { left: 10px; }
        #nextBtn { right: 10px; }
    </style>
</head>
<body>

    <button id="prevBtn" class="nav-arrow">&lt;</button>
    <button id="nextBtn" class="nav-arrow">&gt;</button>

    <canvas id="canvas3d"></canvas>

    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime';

        const canvas = document.getElementById('canvas3d');
        const app = new Application(canvas);

        const images = [
            './images/1.jpg', './images/2.jpg', './images/3.jpg', './images/4.jpg',
            './images/5.jpg', './images/6.jpg', './images/7.jpg', './images/8.jpg',
            './images/9.jpg', './images/10.jpg', './images/11.jpg', './images/12.jpg'
        ];
        let index = 0;

        // Start the loading process
        app.load('./scene.splinecode')
            .then(() => {
                console.log("Spline scene loaded successfully.");
                const rect = app.findObjectByName('Falsecolor Rectangle');

                if (rect) {
                    console.log("Rectangle found: Falsecolor Rectangle");
                    
                    const applyTexture = (i) => {
                        const loader = new THREE.TextureLoader();
                        loader.load(images[i], (texture) => {
                            rect.material.map = texture;
                            rect.material.needsUpdate = true;
                            console.log("Displaying image: " + images[i]);
                        });
                    };

                    applyTexture(index);

                    document.getElementById('nextBtn').onclick = () => {
                        index = (index + 1) % images.length;
                        applyTexture(index);
                    };

                    document.getElementById('prevBtn').onclick = () => {
                        index = (index - 1 + images.length) % images.length;
                        applyTexture(index);
                    };
                } else {
                    console.error("Error: Could not find an object named 'Falsecolor Rectangle'. Check your Spline sidebar.");
                }
            })
            .catch((err) => {
                console.error("Error loading the Spline scene: ", err);
            });
    </script>
</body>
</html>
