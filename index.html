<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Underwater Archive</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; font-family: serif; }

        /* Each section provides the "scroll room" for the Spline animations */
        section {
            position: relative;
            width: 100%;
            height: 300vh; /* Adjust this height to make the scroll faster or slower */
        }

        /* The viewer stays fixed to the eye while the section scrolls past */
        spline-viewer {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>

    <section id="act-one">
        <script type="module" src="https://unpkg.com/@splinetool/viewer/build/spline-viewer.js"></script>
        <spline-viewer url="./scene.splinecode" events-target="global"></spline-viewer>
    </section>

    <section id="act-two">
        <spline-viewer url="./scene_falsecolor.splinecode" events-target="global"></spline-viewer>
    </section>

</body>
</html>
