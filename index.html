<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Gallery</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: serif; }
        canvas { display: block; width: 100%; height: 100vh; }

        /* The Navigation Arrows */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 50px;
            cursor: pointer;
            z-index: 10;
            transition: color 0.3s, transform 0.3s;
            padding: 20px;
        }
        .nav-arrow:hover { color: #fff; transform: translateY(-50%) scale(1.1); }
        #prevBtn { left: 20px; }
        #nextBtn { right: 20px; }

        /* Lightbox for Expansion */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #lightbox img { max-width: 90%; max-height: 90%; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <button id="prevBtn" class="nav-arrow">&lt;</button>
    <button id="nextBtn" class="nav-arrow">&gt;</button>

    <div id="lightbox"><img id="fullView" src=""></div>

    <canvas id="canvas3d"></canvas>

    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime';

        const canvas = document.getElementById('canvas3d');
        const app = new Application(canvas);

        const images = [
            './images/1.jpg', './images/2.jpg', './images/3.jpg', './images/4.jpg',
            './images/5.jpg', './images/6.jpg', './images/7.jpg', './images/8.jpg',
            './images/9.jpg', './images/10.jpg', './images/11.jpg', './images/12.jpg'
        ];
        let index = 0;

        app.load('./scene.splinecode').then(() => {
            const rect = app.findObjectByName('Falsecolor Rectangle');

            const applyTexture = (i) => {
                if (!rect) return;
                const loader = new THREE.TextureLoader();
                loader.load(images[i], (tex) => {
                    // This ensures the image stays inside the rectangle
                    rect.material.map = tex;
                    rect.material.needsUpdate = true;
                });
            };

            // Initialize the first image
            applyTexture(index);

            document.getElementById('nextBtn').onclick = () => {
                index = (index + 1) % images.length;
                applyTexture(index);
            };

            document.getElementById('prevBtn').onclick = () => {
                index = (index - 1 + images.length) % images.length;
                applyTexture(index);
            };

            // Expand on click
            app.on('mouseDown', (e) => {
                if (e.target.name === 'Falsecolor Rectangle') {
                    const lb = document.getElementById('lightbox');
                    document.getElementById('fullView').src = images[index];
                    lb.style.display = 'flex';
                }
            });
        });

        document.getElementById('lightbox').onclick = () => {
            document.getElementById('lightbox').style.display = 'none';
        };
    </script>
</body>
</html>
